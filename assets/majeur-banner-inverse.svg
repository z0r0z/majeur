<svg viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1500" height="500" fill="white"/>

  <!-- MOLOCH vertical text - left side -->
  <text x="120" y="80" fill="black" font-family="monospace" font-size="42" letter-spacing="0.1em" opacity="0.7"
        writing-mode="tb" glyph-orientation-vertical="0">MOLOCH</text>

  <!-- Logo centered -->
  <g transform="translate(750, 250)">
    <!-- Two orbital rings -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="black" stroke-width="1" opacity="0.4"/>
    <circle cx="0" cy="0" r="88" fill="none" stroke="black" stroke-width="1" opacity="0.3"/>

    <!-- Left string -->
    <line x1="-63" y1="-250" x2="-25" y2="0" stroke="black" stroke-width="1.2" opacity="0.5"/>
    <line x1="-63" y1="250" x2="-25" y2="0" stroke="black" stroke-width="1.2" opacity="0.5"/>

    <!-- Center string -->
    <line x1="0" y1="-250" x2="0" y2="0" stroke="black" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="250" x2="0" y2="0" stroke="black" stroke-width="2" opacity="0.7"/>

    <!-- Right string -->
    <line x1="63" y1="-250" x2="25" y2="0" stroke="black" stroke-width="1.2" opacity="0.5"/>
    <line x1="63" y1="250" x2="25" y2="0" stroke="black" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- MAJEUR vertical text - right side -->
  <text x="1380" y="80" fill="black" font-family="monospace" font-size="42" letter-spacing="0.1em" opacity="0.7"
        writing-mode="tb" glyph-orientation-vertical="0">MAJEUR</text>
</svg>
