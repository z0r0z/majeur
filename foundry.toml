[profile.default]
solc_version = "0.8.30"
evm_version = "cancun"

optimizer = true
optimizer_runs = 200

via_ir = true

# Allow larger contracts for ViewHelper (bypasses 24576 byte limit)
code_size_limit = 30000

remappings = [
  "@solady=lib/solady/",
  "@forge=lib/forge-std/src/",
  "@zamm=lib/ZAMM/src/"
]

[fmt]
line_length = 100

[rpc_endpoints]
main = "https://rpc.ankr.com/eth"
base = "https://rpc.ankr.com/base"
poly = "https://rpc.ankr.com/polygon"
opti = "https://rpc.ankr.com/optimism"
arbi = "https://rpc.ankr.com/arbitrum"